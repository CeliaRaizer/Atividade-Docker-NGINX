server {
    listen 80;
    server_name blog.techvision.local; #Define qual domínio ativa esse bloco

    root /usr/share/nginx/html/blog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name docs.techvision.local;

    root /usr/share/nginx/html/docs;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}