version: '3.8'

services:
  app:
    build: ./app
    container_name: fastbite_app
    restart: always
    networks:
      - fastbite_net

  nginx:
    image: nginx:latest
    container_name: fastbite_nginx
    ports:
     - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - fastbite_net

networks:
  fastbite_net: